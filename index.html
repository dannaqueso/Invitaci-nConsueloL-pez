<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación 70 años</title>

<style>

body{
margin:0;
font-family:serif;
}

.section{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
}

.section img{
width:100%;
height:100%;
object-fit:cover;
}

/* CONTADOR */

.countdown{
position:absolute;
top:85%;
left:50%;
transform:translate(-50%,-50%);
color:#ede5d8;
font-size:56px;
font-weight:900;
display:flex;
gap:28px;
text-align:center;
}

.countdown small{
font-size:14px;
display:block;
margin-top:4px;
letter-spacing:1px;
}

/* MAPA */

.map-container{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
width:80%;
height:220px;
}

.map-container iframe{
width:100%;
height:100%;
border:none;
border-radius:10px;
}

/* BOTON */

.confirmar{
position:absolute;
top:30%;
left:50%;
transform:translate(-50%,-50%);
background:#2c0d13;
color:#ede5d8;
padding:18px 30px;
border-radius:30px;
text-decoration:none;
font-size:18px;
}

</style>

</head>

<body>

<!-- HERO -->

<div class="section">
<img src="assets/hero.jpg">
</div>

<!-- MENSAJE + CONTADOR -->

<div class="section">

<img src="assets/contador-bg.jpg">

<div class="countdown">

<div>
<div id="dias"></div>
<small>días</small>
</div>

<div>
<div id="horas"></div>
<small>hrs</small>
</div>

<div>
<div id="minutos"></div>
<small>min</small>
</div>

<div>
<div id="segundos"></div>
<small>seg</small>
</div>

</div>

</div>

<!-- UBICACION -->

<div class="section">

<img src="assets/mapa-bg.jpg">

<a href="https://www.google.com/maps/search/?api=1&query=Salón+Punta+del+Sol+Abelardo+L.+Rodríguez+1707+Aguascalientes" target="_blank">

<div class="map-container">

<iframe
src="https://www.google.com/maps?q=Salón%20Punta%20del%20Sol%20Abelardo%20L.%20Rodríguez%201707%20Aguascalientes&output=embed">
</iframe>

</div>

</a>

</div>

<!-- CONFIRMACION -->

<div class="section">

<img src="assets/confirmacion.jpg">

<a class="confirmar"
href="https://wa.me/524492644872?text=Confirmo%20mi%20asistencia%0A%0ANombre:%0ANúmero%20de%20adultos:%0ANúmero%20de%20niños:">
Confirmar asistencia </a>

</div>

<script>

/* Fecha del evento - Aguascalientes (UTC-6) */
const eventDate = new Date("2026-09-05T15:00:00-06:00").getTime();

function formatNumber(num){
return num < 10 ? "0" + num : num;
}

setInterval(function(){

const now = new Date().getTime();
const distance = eventDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("dias").innerHTML = formatNumber(days);
document.getElementById("horas").innerHTML = formatNumber(hours);
document.getElementById("minutos").innerHTML = formatNumber(minutes);
document.getElementById("segundos").innerHTML = formatNumber(seconds);

},1000);

</script>

</body>
</html>
